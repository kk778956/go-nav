services:
  go-nav:
    build: .
    image: ${IMAGE_NAME:-go-nav}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin123}
      SESSION_SECRET: ${SESSION_SECRET:-please-change-me-to-a-long-random-string}
      DATA_DIR: /app/data
    volumes:
      - ${DATA_MOUNT:-go-nav-data:/app/data}

volumes:
  go-nav-data:
